version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: linkedin-autopost-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped

  redis:
    image: redis:alpine
    container_name: linkedin-autopost-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  web:
    build:
      context: .
      target: web
    container_name: linkedin-autopost-web
    ports:
      - "4000:3000"
    env_file:
      - .env.production
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/linkedin-autopost
      - REDIS_URL=redis://redis:6379
      - NEXT_PUBLIC_APP_URL=http://localhost:4000
    depends_on:
      - mongodb
      - redis
    restart: unless-stopped

  worker:
    build:
      context: .
      target: worker
    container_name: linkedin-autopost-worker
    env_file:
      - .env.production
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/linkedin-autopost
      - REDIS_URL=redis://redis:6379
      - NEXT_PUBLIC_APP_URL=http://localhost:4000
    depends_on:
      - mongodb
      - redis
    restart: unless-stopped

volumes:
  mongodb_data:
  redis_data:
